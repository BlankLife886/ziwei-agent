apiVersion: v1
kind: Namespace
metadata:
  name: ziwei-agent
---
apiVersion: v1
kind: Secret
metadata:
  name: ziwei-agent-runtime
  namespace: ziwei-agent
type: Opaque
stringData:
  runtime-secrets.json: |
    {
      "ZIWEI_API_CREDENTIALS": [
        {
          "id": "app-client",
          "token": "replace-with-api-token",
          "scopes": ["reports:write"],
          "disabled": false
        }
      ],
      "ZIWEI_LLM_API_KEY": "replace-with-model-key"
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ziwei-agent-runtime
  namespace: ziwei-agent
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ziwei-agent
  namespace: ziwei-agent
  labels:
    app: ziwei-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ziwei-agent
  template:
    metadata:
      labels:
        app: ziwei-agent
    spec:
      containers:
        - name: ziwei-agent
          image: ziwei-agent:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: ZIWEI_API_OBSERVABILITY
              value: stdout
            - name: ZIWEI_API_MAX_BODY_BYTES
              value: "100000"
            - name: ZIWEI_API_RATE_LIMIT_WINDOW_MS
              value: "60000"
            - name: ZIWEI_API_RATE_LIMIT_MAX
              value: "60"
            - name: ZIWEI_API_QUOTA_STORE
              value: /app/.runtime/api-quota.json
            - name: ZIWEI_KNOWLEDGE_STORE
              value: data/knowledge-snippets.example.json
            - name: ZIWEI_RUNTIME_SECRETS_FILE
              value: /run/secrets/ziwei/runtime-secrets.json
          volumeMounts:
            - name: runtime-secret
              mountPath: /run/secrets/ziwei
              readOnly: true
            - name: runtime-state
              mountPath: /app/.runtime
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: runtime-secret
          secret:
            secretName: ziwei-agent-runtime
        - name: runtime-state
          persistentVolumeClaim:
            claimName: ziwei-agent-runtime
---
apiVersion: v1
kind: Service
metadata:
  name: ziwei-agent
  namespace: ziwei-agent
spec:
  selector:
    app: ziwei-agent
  ports:
    - name: http
      port: 80
      targetPort: http
